name: Convert Local ONNX to OM Model

# 触发工作流的事件
on:
  workflow_dispatch:

jobs:
  onnx2om:
    strategy:
      matrix:
        runs-on: [ubuntu-22.04]
    runs-on: ${{ matrix.runs-on }}
    container:
      image: kaylor/atc
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # 只需要最新代码即可，加快检出速度

    - name: Run ATC Convert Script
      shell: bash
      run: |
        # 安装可能需要的系统依赖
        if command -v apt-get &> /dev/null; then
          apt-get update && apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev
        fi
        
        # 安装dill包
        if command -v pip &> /dev/null; then
          pip install dill
        fi
        
        SRC_PATH=$(pwd)
        mkdir -pv om
        
        # 【修改点】从本地仓库读取 ONNX 文件
        # 优先查找根目录下的 yolo.onnx，如果没有则匹配任意 .onnx 文件
        if [ -f "${SRC_PATH}/yolo.onnx" ]; then
          echo "Found yolo.onnx in repository root."
          cp -v "${SRC_PATH}/yolo.onnx" ./om/
        elif ls ${SRC_PATH}/*.onnx 1> /dev/null 2>&1; then
          echo "Found ONNX file(s) in repository root."
          cp -v ${SRC_PATH}/*.onnx ./om/
        else
          echo "Error: No ONNX file found in repository root!"
          echo "请确保你已将改写后的 ONNX 模型文件上传到了代码仓库的根目录下。"
          exit 1
        fi
        
        # 华为昇腾环境变量配置
        source /usr/local/Ascend/ascend-toolkit/set_env.sh
        export LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/x86_64-linux/devlib/:$LD_LIBRARY_PATH
        
        cd om
        # 动态获取复制过来的 ONNX 文件名
        ONNX_MODEL=$(ls *.onnx | head -n 1)
        echo "Converting model: ${ONNX_MODEL} to OM format..."
        
        # 执行 ATC 转换
        atc --model="${ONNX_MODEL}" --framework=5 --output=yolo --soc_version=Ascend310B4

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: om_artifacts
        path: om/*.om
